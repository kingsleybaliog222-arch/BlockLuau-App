<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BlockLuau - Roblox Visual Scripting</title><script src="https://unpkg.com/blockly/blockly.min.js"></script><style>body{margin:0;padding:0;font-family:'Segoe UI',sans-serif;background:#1e1e1e;color:#fff;display:flex;flex-direction:column;height:100vh}header{background:#111;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #00bfff}.logo{font-size:24px;font-weight:bold;color:#00bfff}button{background:#00bfff;color:#000;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-weight:bold}button:hover{background:#00d4ff}#workspace{flex:1;display:flex}#blocklyDiv{flex:1;height:100%}#codePanel{width:380px;background:#2d2d2d;border-left:2px solid #00bfff;display:flex;flex-direction:column}#generatedCode{flex:1;padding:15px;background:#1e1e1e;font-family:monospace;white-space:pre;overflow:auto;font-size:14px}</style></head><body><header><div class="logo">🟦 BlockLuau</div><div><button onclick="generateLuau()">Generate Luau</button><button onclick="copyCode()">📋 Copy Code</button><button onclick="clearWorkspace()">Clear</button></div></header><div id="workspace"><div id="blocklyDiv"></div><div id="codePanel"><div style="padding:10px;color:#00bfff;font-weight:bold">Generated Luau Script (Roblox)</div><pre id="generatedCode">-- Your script will appear here</pre></div></div><script>let workspace;function initBlockly(){const toolbox=`<xml><category name="Start" colour="#4CAF50"><block type="start_script"></block></category><category name="Roblox" colour="#00BFFF"><block type="roblox_print"></block><block type="roblox_wait"></block><block type="roblox_part"></block></category><category name="Logic" colour="#FF9800"><block type="controls_if"></block><block type="logic_compare"></block></category></xml>`;workspace=Blockly.inject('blocklyDiv',{toolbox:toolbox,grid:{spacing:20,length:3,colour:'#555',snap:true},zoom:{controls:true,wheel:true},trashcan:true,theme:Blockly.Themes.Dark});Blockly.Blocks['start_script']={init:function(){this.appendDummyInput().appendField('📜 Script Start');this.setNextStatement(true,null);this.setColour('#4CAF50')}};Blockly.Blocks['roblox_print']={init:function(){this.appendValueInput('TEXT').setCheck('String').appendField('🖨️ Print');this.setPreviousStatement(true,null);this.setNextStatement(true,null);this.setColour('#00BFFF')}};Blockly.Blocks['roblox_wait']={init:function(){this.appendValueInput('TIME').setCheck('Number').appendField('⏳ Wait');this.setPreviousStatement(true,null);this.setNextStatement(true,null);this.setColour('#00BFFF')}};Blockly.Blocks['roblox_part']={init:function(){this.appendDummyInput().appendField('🟦 Create Part');this.appendValueInput('NAME').setCheck('String').appendField('Name');this.setPreviousStatement(true,null);this.setNextStatement(true,null);this.setColour('#00BFFF')}};Blockly.JavaScript['start_script']=()=>'';Blockly.JavaScript['roblox_print']=function(block){const text=Blockly.JavaScript.valueToCode(block,'TEXT',Blockly.JavaScript.ORDER_ATOMIC)||'""';return `print(${text})
`;};Blockly.JavaScript['roblox_wait']=function(block){const time=Blockly.JavaScript.valueToCode(block,'TIME',Blockly.JavaScript.ORDER_ATOMIC)||'1';return `task.wait(${time})
`;};Blockly.JavaScript['roblox_part']=function(block){const name=Blockly.JavaScript.valueToCode(block,'NAME',Blockly.JavaScript.ORDER_ATOMIC)||'"Part"';return `local part = Instance.new("Part")
part.Name = ${name}
part.Parent = workspace
`;};workspace.addChangeListener(generateLuau);}function generateLuau(){if(!workspace)return;let code='-- BlockLuau Generated Script\n\nlocal script = script\n';code += Blockly.JavaScript.workspaceToCode(workspace);document.getElementById('generatedCode').textContent=code||'-- Add blocks to generate code';}function clearWorkspace(){if(confirm('Clear workspace?')){workspace.clear();generateLuau();}}function copyCode(){const code=document.getElementById('generatedCode').textContent;navigator.clipboard.writeText(code).then(()=>alert('✅ Copied to clipboard! Paste into Roblox Studio.'));}window.onload=initBlockly;</script></body></html>
