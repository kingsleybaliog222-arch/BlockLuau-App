<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockLuau</title>
<script src="https://unpkg.com/blockly/blockly.min.js"></script>
<style>body{margin:0;padding:0;background:#1e1e1e;color:#fff;font-family:sans-serif;height:100vh;display:flex;flex-direction:column}header{background:#111;padding:10px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #00bfff}.logo{font-size:24px;font-weight:bold;color:#00bfff}button{background:#00bfff;color:black;border:none;padding:10px 16px;border-radius:5px;margin:0 5px;cursor:pointer}#workspace{flex:1;display:flex}#blocklyDiv{flex:1}#codePanel{width:400px;background:#2d2d2d;border-left:3px solid #00bfff;display:flex;flex-direction:column}#generatedCode{flex:1;padding:15px;overflow:auto;font-family:monospace;background:#1a1a1a}</style>
</head>
<body>
<header>
<div class="logo">🟦 BlockLuau</div>
<div><button onclick="generateLuau()">Generate Luau</button><button onclick="copyCode()">Copy</button></div>
</header>
<div id="workspace">
<div id="blocklyDiv"></div>
<div id="codePanel">
<div style="padding:10px;background:#333;color:#0bf">Generated Luau Code</div>
<pre id="generatedCode">-- Your script here</pre>
</div>
</div>
<script>let w;function init(){const tb=`<xml><category name="Start" colour="#4CAF50"><block type="start"></block></category><category name="Roblox" colour="#00BFFF"><block type="print"></block><block type="wait"></block></category></xml>`;w=Blockly.inject('blocklyDiv',{toolbox:tb,trashcan:true,theme:Blockly.Themes.Dark});Blockly.Blocks.start={init:function(){this.appendDummyInput().appendField("Script Starts");this.setNextStatement(true);this.setColour('#4CAF50')}};Blockly.Blocks.print={init:function(){this.appendValueInput('T').appendField('Print');this.setPreviousStatement(true);this.setNextStatement(true);this.setColour('#00BFFF')}};Blockly.JavaScript.print=function(b){return`print(${Blockly.JavaScript.valueToCode(b,'T',Blockly.JavaScript.ORDER_ATOMIC)||'""'})
`};w.addChangeListener(()=>{document.getElementById('generatedCode').textContent=Blockly.JavaScript.workspaceToCode(w)});}window.onload=init;function generateLuau(){}function copyCode(){navigator.clipboard.writeText(document.getElementById('generatedCode').textContent).then(()=>alert('Copied! Paste in Roblox'))}</script>
</body>
</html>
